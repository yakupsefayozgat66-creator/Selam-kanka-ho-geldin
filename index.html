<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPM Sefa</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .kutu { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; max-width: 350px; margin: auto; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; color: #fff; font-weight: bold; text-decoration: none; cursor: pointer; font-size: 16px; box-sizing: border-box; }
        .mavi { background: #007bff; }
        .yesil { background: #28a745; }
        .insta { background: linear-gradient(45deg, #f09433, #bc1888); }
        /* GERİ DÖN BUTONU - KIPKIRMIZI VE EN ÜSTTE */
        .geri-btn { background: #ff0000 !important; border: 2px solid #fff !important; display: block !important; margin-bottom: 20px !important; }
        .sakla { display: none !important; }
        ul { text-align: left; background: #222; padding: 15px; border-radius: 10px; list-style: none; }
        li { margin-bottom: 5px; font-size: 14px; }
    </style>
</head>
<body>

<div class="kutu">
    <div id="ana">
        <h2>CPM SEFA</h2>
        <a href="https://play.google.com/store/apps/details?id=com.olzhas.carparking.multyplayer" class="btn yesil">CPM OYUNU İNDİR</a>
        <p>Devam etmek için @jakobss66 takip et!</p>
        <a href="https://instagram.com/jakobss66" class="btn insta">TAKİP ET</a>
        <button onclick="menuyeGit()" class="btn mavi">BAŞLAT</button>
    </div>

    <div id="menu" class="sakla">
        <h3>NE İSTİYORSUN?</h3>
        <button onclick="bedavaGit()" class="btn mavi">1- Bedava Hesap</button>
        <button onclick="paraliGit()" class="btn mavi">2- Paralı Hesap</button>
    </div>

    <div id="bedava-sayfa" class="sakla">
        <button onclick="anaMenuyeDon()" class="btn geri-btn">⬅ ANA MENÜYE DÖN</button>
        <h3>BEDAVA HESAP</h3>
        <p>Yasak olduğu için DM'den veriyorum.</p>
        <a href="https://instagram.com/jakobss66" class="btn insta">DM GÖNDER</a>
    </div>

    <div id="parali-sayfa" class="sakla">
        <button onclick="anaMenuyeDon()" class="btn geri-btn">⬅ ANA MENÜYE DÖN</button>
        <h3>FİYAT LİSTESİ</h3>
        <ul>
            <li>Mini Hesap: 100 TL</li>
            <li>Efsane Hesap: 200 TL</li>
            <li>Ultra Hesap: 300 TL</li>
        </ul>
        <a href="https://instagram.com/jakobss66" class="btn insta">SATIN AL (DM)</a>
    </div>
</div>

<script>
    function saklaHepsi() {
        document.getElementById('ana').classList.add('sakla');
        document.getElementById('menu').classList.add('sakla');
        document.getElementById('bedava-sayfa').classList.add('sakla');
        document.getElementById('parali-sayfa').classList.add('sakla');
    }

    function menuyeGit() {
        saklaHepsi();
        document.getElementById('menu').classList.remove('sakla');
    }

    function bedavaGit() {
        saklaHepsi();
        document.getElementById('bedava-sayfa').classList.remove('sakla');
    }

    function paraliGit() {
        saklaHepsi();
        document.getElementById('parali-sayfa').classList.remove('sakla');
    }

    function anaMenuyeDon() {
        saklaHepsi();
        document.getElementById('menu').classList.remove('sakla');
    }
</script>

</body>
</html>
