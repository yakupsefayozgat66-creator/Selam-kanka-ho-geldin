<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CPM Sefa Bot</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #bot-container { background: #1e1e1e; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 350px; text-align: center; }
        .btn { background: #3498db; border: none; color: white; padding: 12px 20px; margin: 10px 5px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn:hover { background: #2980b9; }
        .btn-insta { background: #e1306c; }
        .warning { color: #f1c40f; font-size: 0.85em; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="bot-container">
    <div id="step1">
        <h3>Hoş Geldin!</h3>
        <p>Devam etmek için lütfen Instagram hesabımızı takip edin.</p>
        <a href="https://instagram.com/jakobss66" target="_blank">
            <button class="btn btn-insta">@jakobss66 Takip Et</button>
        </a>
        <button class="btn" onclick="showStep2()">Başlat</button>
    </div>

    <div id="step2" class="hidden">
        <h3>CPM Sefa Kanalına Hoş Geldiniz!</h3>
        <p>Lütfen bir seçenek seçin:</p>
        <button class="btn" onclick="selectOption(1)">1 - Bedava Hesap</button>
        <button class="btn" onclick="selectOption(2)">2 - Paralı Hesap</button>
        <p class="warning">Not: Bedava hesaplar randomdur, kötü çıkabilir!!!</p>
    </div>

    <div id="step3" class="hidden">
        <h3 id="result-title"></h3>
        <p id="result-text"></p>
        <button class="btn" onclick="location.reload()">Başa Dön</button>
    </div>
</div>

<script>
    function showStep2() {
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
    }

    function selectOption(choice) {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
        
        const title = document.getElementById('result-title');
        const text = document.getElementById('result-text');

        if(choice === 1) {
            title.innerText = "Bedava Hesap Hazırlanıyor...";
            text.innerText = "Lütfen bekleyin, size rastgele bir hesap atanıyor. (Hesap kalitesi garanti edilmez)";
        } else {
            title.innerText = "Paralı Hesap Seçildi";
            text.innerText = "Yüksek kaliteli hesaplar için ödeme sayfasına yönlendiriliyorsunuz...";
        }
    }
</script>

</body>
</html>
